<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>非遗油纸伞文化网</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{padding-top: 56px;}
        .card:hover{transform: translateY(-5px);transition: 0.3s;box-shadow: 0 5px 15px #ccc;}
    </style>
</head>
<body>
<!--导航栏-->
<nav class="navbar navbar-expand-lg navbar-dark bg-danger fixed-top">
    <div class="container">
        <a class="navbar-brand" href="#">非遗油纸伞文化</a>
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link active" href="#home">首页</a></li>
                <li class="nav-item"><a class="nav-link" href="#show">作品展示</a></li>
                <li class="nav-item"><a class="nav-link" href="#know">文化科普</a></li>
                <li class="nav-item"><a class="nav-link" href="#msg">留言互动</a></li>
            </ul>
        </div>
    </div>
</nav>

<!--轮播图-->
<section id="home">
    <div id="lunbo" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="https://picsum.photos/1920/600?1" class="w-100">
            </div>
            <div class="carousel-item">
                <img src="https://picsum.photos/1920/600?2" class="w-100">
            </div>
        </div>
        <button class="carousel-control-prev" data-bs-target="#lunbo" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" data-bs-target="#lunbo" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>
</section>

<!--作品展示-->
<section id="show" class="py-5">
    <div class="container">
        <h2 class="text-center mb-5">油纸伞精品款式</h2>
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card">
                    <img src="https://picsum.photos/400/300?10" class="card-img-top imgClick">
                    <div class="card-body text-center">
                        <h5>古风花鸟伞</h5>
                        <p>手绘花鸟纹样，古典韵味十足</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <img src="https://picsum.photos/400/300?11" class="card-img-top imgClick">
                    <div class="card-body text-center">
                        <h5>江南烟雨伞</h5>
                        <p>素雅简约，尽显江南风情</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <img src="https://picsum.photos/400/300?12" class="card-img-top imgClick">
                    <div class="card-body text-center">
                        <h5>吉祥红伞</h5>
                        <p>喜庆大红配色，寓意平安顺遂</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<!--文化科普-->
<section id="know" class="py-5 bg-light">
    <div class="container">
        <h2 class="text-center mb-5">油纸伞文化知识</h2>
        <div class="accordion" id="acc">
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#a1">油纸伞起源</button>
                </h2>
                <div id="a1" class="accordion-collapse collapse show" data-bs-parent="#acc">
                    <div class="accordion-body">
                        油纸伞是中国千年传统手工艺品，起源于唐宋时期，不仅是防雨工具，更是承载民俗情怀的非遗好物，现已列入非物质文化遗产名录。
                    </div>
                </div>
            </div>
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#a2">手工制作工艺</button>
                </h2>
                <div id="a2" class="accordion-collapse collapse" data-bs-parent="#acc">
                    <div class="accordion-body">
                        古法油纸伞制作工序繁杂，包含选竹制骨、裱纸、绘图、上桐油、晾晒定型等数十道工序，全程依靠匠人手工打造。
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<!--留言表单-->
<section id="msg" class="py-5">
    <div class="container">
        <h2 class="text-center mb-5">文化留言</h2>
        <div class="row justify-content-center">
            <div class="col-md-6">
                <form id="form">
                    <input type="text" class="form-control mb-3" placeholder="输入姓名" id="name">
                    <textarea class="form-control mb-3" rows="4" placeholder="写下你的感想" id="text"></textarea>
                    <button type="submit" class="btn btn-danger w-100">提交留言</button>
                </form>
            </div>
        </div>
    </div>
</section>

<!--图片放大弹窗-->
<div class="modal fade" id="imgModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-body">
                <img id="bigImg" class="w-100">
            </div>
        </div>
    </div>
</div>

<!--页脚-->
<footer class="bg-dark text-white text-center py-3">
    非遗油纸伞文化网站 版权所有 实训作业
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
//图片点击放大
let imgModal = new bootstrap.Modal(document.getElementById('imgModal'));
let bigImg = document.getElementById('bigImg');
document.querySelectorAll('.imgClick').forEach(item=>{
    item.onclick=function(){
        bigImg.src = this.src;in
        imgModal.show();
    }
})
//表单提交
document.getElementById('form').onsubmit=function(e){
    e.preventDefault();
    alert("留言提交成功！一起传承油纸伞非遗文化");
    this.reset();
}
//导航滚动变色
window.onscroll=function(){
    let nav=document.querySelector('.navbar');
    if(window.scrollY>100){
        nav.classList.remove('bg-danger');
        nav.classList.add('bg-dark');
    }else{
        nav.classList.remove('bg-dark');
        nav.classList.add('bg-danger');
    }
}
</script>
</body>
</html>
